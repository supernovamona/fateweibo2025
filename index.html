<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>文游</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #08080f;
  --text: #d8d0c8;
  --text-dim: #7a7268;
  --accent: #c8a882;
  --red: #cc3333;
  --section-color: #4a4a5a;
  --sns-bg: #111118;
  --sns-border: #2a2a38;
  --font-body: 'PingFang SC', 'Hiragino Mincho ProN', 'STSong', serif;
  --font-ui: 'PingFang SC', 'Hiragino Sans GB', sans-serif;
}

html, body {
  width: 1920px; height: 960px;
  overflow: hidden;
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-body);
  font-size: 17px;
  line-height: 1.95;
  cursor: default;
  user-select: none;
}

/* ── SCREENS ── */
#screen-title, #screen-reader, #screen-cg {
  position: absolute; inset: 0;
  width: 1920px; height: 960px;
}

/* ── TITLE SCREEN ── */
#screen-title {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: var(--bg);
  z-index: 10;
}
#screen-title .header-img {
  width: auto;
  height: 560px;
  object-fit: contain;
  display: block;
  opacity: 0;
  animation: fadeIn 1.2s ease 0.3s forwards;
}
#screen-title .title-meta {
  margin-top: 36px;
  text-align: center;
  opacity: 0;
  animation: fadeIn 1s ease 1s forwards;
}
#screen-title .chapter-label {
  font-family: var(--font-ui);
  font-size: 11px;
  letter-spacing: 0.2em;
  color: var(--text-dim);
  margin-bottom: 10px;
}
#screen-title .chapter-title {
  font-size: 26px;
  letter-spacing: 0.05em;
  color: var(--text);
  margin-bottom: 8px;
}
#screen-title .chapter-subtitle {
  font-size: 13px;
  color: var(--text-dim);
  letter-spacing: 0.1em;
}
#screen-title .start-hint {
  margin-top: 48px;
  font-family: var(--font-ui);
  font-size: 13px;
  letter-spacing: 0.25em;
  color: var(--text-dim);
  opacity: 0;
  animation: fadeIn 0.6s ease 1.8s forwards;
}

/* ── MAIN SCREEN (title + chapter select combined) ── */
#screen-main {
  position: absolute; inset: 0;
  background: var(--bg);
  z-index: 10;
}
.main-cover-wrap {
  position: absolute;
  inset: 0;
}
.main-header-img {
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: calc(100% - 660px);
  height: 100%;
  object-fit: contain;
  object-position: center center;
  opacity: 0;
  animation: fadeIn 1.2s ease 0.3s forwards;
}
.main-header-hover {
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: calc(100% - 660px);
  height: 100%;
  object-fit: contain;
  object-position: center center;
  opacity: 0;
  transition: opacity 0.45s ease;
  z-index: 1;
  background: var(--bg);
}
.main-overlay {
  position: absolute;
  inset: 0;
  z-index: 2;
  background:
    linear-gradient(to right,  rgba(8,8,15,0.65) 0%, transparent 14%),
    linear-gradient(to bottom, rgba(8,8,15,0.7)  0%, transparent 14%),
    linear-gradient(to top,    rgba(8,8,15,0.7)  0%, transparent 14%),
    linear-gradient(to right,  transparent 40%, rgba(8,8,15,0.6) 56%, rgba(8,8,15,0.95) 70%, rgba(8,8,15,0.99) 100%);
}
.main-brand {
  position: absolute;
  bottom: 40px;
  left: 48px;
  z-index: 4;
  font-family: var(--font-ui);
  font-size: 11px;
  letter-spacing: 0.4em;
  color: rgba(255,255,255,0.3);
  text-transform: uppercase;
}
.main-right {
  position: absolute;
  right: 0; top: 0; bottom: 0;
  width: 720px;
  z-index: 3;
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 60px 80px;
  gap: 28px;
  overflow-y: auto;
}
.main-right-label {
  font-family: var(--font-ui);
  font-size: 10px;
  letter-spacing: 0.5em;
  color: var(--text-dim);
  text-transform: uppercase;
  opacity: 0;
  animation: fadeIn 0.8s ease 0.6s forwards;
}
.chapter-list {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px 36px;
  opacity: 0;
  animation: fadeIn 0.8s ease 0.9s forwards;
}
.chapter-item {
  padding: 16px 20px;
  border: 1px solid var(--sns-border);
  cursor: pointer;
  transition: border-color 0.25s ease, background 0.25s ease;
}
.chapter-item:hover {
  border-color: var(--accent);
  background: rgba(200,168,130,0.06);
}
.chapter-item.locked {
  opacity: 0.3;
  cursor: default;
}
.chapter-item .ch-num {
  font-family: var(--font-ui);
  font-size: 10px;
  letter-spacing: 0.3em;
  color: var(--text-dim);
  margin-bottom: 6px;
}
.chapter-item .ch-title {
  font-size: 14px;
  color: var(--text);
  line-height: 1.4;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

/* ── SECTION INDICATOR ── */
#topbar-left {
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  justify-content: center;
  gap: 4px;
}
#topbar-chapter {
  font-family: var(--font-ui);
  font-size: 15px;
  letter-spacing: 0.25em;
  color: var(--text-dim);
}
#section-indicator {
  display: flex;
  align-items: flex-start;
  gap: 0;
  line-height: 1;
  height: 136px;
  overflow: visible;
}
.digit-wrap {
  position: relative;
  overflow: hidden;
  height: 120px;
  display: inline-block;
  font-family: var(--font-ui);
  font-size: 120px;
  font-weight: 700;
  letter-spacing: 0.05em;
  color: rgba(74, 74, 90, 0.35);
  line-height: 1;
}
.digit-static {
  display: block;
  line-height: 1;
}
.digit-out {
  display: block;
  line-height: 1;
  animation: digitOut 0.38s cubic-bezier(0.4, 0, 0.2, 1) forwards;
}
.digit-in {
  position: absolute;
  left: 0; top: 0; right: 0;
  display: block;
  line-height: 1;
  animation: digitIn 0.38s cubic-bezier(0.4, 0, 0.2, 1) forwards;
}
@keyframes digitOut {
  from { transform: translateY(0);     opacity: 1; }
  to   { transform: translateY(-110%); opacity: 0; }
}
@keyframes digitIn {
  from { transform: translateY(110%);  opacity: 0; }
  to   { transform: translateY(0);     opacity: 1; }
}

/* ── INLINE CG ── */
#page-container.showing-cg {
  padding: 0;
  height: 100%;
  max-height: 100%;
  width: 100%;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
}
.page-cg-inline {
  position: relative;
  width: 100%;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
}
.page-cg-inline::before,
.page-cg-inline::after {
  content: '';
  position: absolute;
  left: 0; right: 0;
  height: 120px;
  z-index: 1;
  pointer-events: none;
}
.page-cg-inline::before {
  top: 0;
  background: linear-gradient(to bottom, #08080f 0%, transparent 100%);
}
.page-cg-inline::after {
  bottom: 0;
  background: linear-gradient(to top, #08080f 0%, transparent 100%);
}
.cg-inline-img {
  max-width: 100%;
  max-height: 100%;
  width: auto;
  height: auto;
  object-fit: contain;
  display: block;
  animation: cgSlide 0.9s cubic-bezier(0.2, 0, 0.2, 1) forwards;
}
@keyframes cgSlide {
  from { opacity: 0; transform: translateY(28px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ── MEMORY / FLASHBACK TEXT ── */
.page-text.memory p {
  color: #8a8480;
  font-style: italic;
}

/* ── RED EMPHASIS ── */
.text-red { color: var(--red); }

/* ── READER SCREEN ── */
#screen-reader {
  display: none;
  flex-direction: column;
}

/* top bar */
#topbar {
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 170px;
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  padding: 22px 40px 0;
  z-index: 20;
}
#topbar-left {
  font-family: var(--font-ui);
  font-size: 11px;
  letter-spacing: 0.3em;
  color: var(--text-dim);
}
#topbar-right {
  display: flex;
  gap: 24px;
  align-items: center;
  padding-top: 1px;
}
.topbar-btn {
  font-family: var(--font-ui);
  font-size: 12px;
  letter-spacing: 0.2em;
  color: var(--text-dim);
  cursor: pointer;
  padding: 6px 12px;
  border: 1px solid transparent;
  transition: color 0.2s, border-color 0.2s;
}
.topbar-btn:hover, .topbar-btn.active {
  color: var(--accent);
  border-color: var(--accent);
}

/* content area */
#content-area {
  position: absolute;
  top: 170px; bottom: 64px;
  left: 0; right: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}

#page-container {
  width: 720px;
  max-height: 100%;
  overflow-y: auto;
  scrollbar-width: none;
  padding: 40px 0;
}
#page-container::-webkit-scrollbar { display: none; }

/* bottom bar */
#bottombar {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 64px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 60px;
}
.nav-btn {
  font-family: var(--font-ui);
  font-size: 11px;
  letter-spacing: 0.3em;
  color: var(--text-dim);
  cursor: pointer;
  transition: color 0.2s;
  padding: 8px 20px;
}
.nav-btn:hover { color: var(--accent); }
.nav-btn.disabled { opacity: 0.2; pointer-events: none; }
#page-counter {
  font-family: var(--font-ui);
  font-size: 11px;
  letter-spacing: 0.2em;
  color: var(--section-color);
  min-width: 80px;
  text-align: center;
  cursor: pointer;
  transition: color 0.2s;
}
#page-counter:hover { color: var(--accent); }
#page-jump-wrap {
  position: relative;
  display: none;
  align-items: center;
}
#page-jump-input {
  background: transparent;
  border: none;
  border-bottom: 1px solid var(--accent);
  color: var(--text);
  font-family: var(--font-ui);
  font-size: 11px;
  letter-spacing: 0.2em;
  width: 60px;
  text-align: center;
  outline: none;
  padding: 2px 4px;
}
#page-jump-hint {
  font-family: var(--font-ui);
  font-size: 10px;
  color: var(--text-dim);
  letter-spacing: 0.15em;
  margin-left: 8px;
}

/* ── CG SCREEN ── */
#screen-cg {
  display: none;
  align-items: center;
  justify-content: center;
  background: #000;
  z-index: 30;
  cursor: pointer;
}
#screen-cg img {
  max-width: 1920px;
  max-height: 960px;
  width: auto;
  height: 100%;
  object-fit: contain;
}

/* ── PAGE CONTENT TYPES ── */

/* section header */
.page-section {
  text-align: center;
  padding: 20px 0 30px;
}
.page-section .section-number {
  font-family: var(--font-ui);
  font-size: 72px;
  font-weight: 200;
  letter-spacing: 0.2em;
  color: var(--section-color);
  line-height: 1;
}

/* epigraph */
.page-epigraph {
  text-align: center;
  padding: 30px 40px;
  border-left: 2px solid var(--section-color);
  margin: 0 60px;
}
.page-epigraph p {
  color: var(--text-dim);
  font-size: 16px;
  letter-spacing: 0.15em;
  line-height: 2.2;
}

/* regular text */
.page-text p {
  margin-bottom: 1.4em;
  text-indent: 2em;
  color: var(--text);
}
.page-text p:last-child { margin-bottom: 0; }

/* no-indent for dialogue or single lines */
.page-text p.no-indent { text-indent: 0; }

/* sns post card */
.page-sns-post {
  background: var(--sns-bg);
  border: 1px solid var(--sns-border);
  border-radius: 8px;
  padding: 20px 24px;
  margin: 8px 0;
}
.sns-platform {
  font-family: var(--font-ui);
  font-size: 11px;
  color: var(--text-dim);
  letter-spacing: 0.1em;
  margin-bottom: 10px;
}
.sns-author {
  font-family: var(--font-ui);
  font-size: 14px;
  font-weight: 600;
  color: #8899cc;
  margin-bottom: 8px;
}
.sns-title {
  font-size: 15px;
  color: var(--text);
  margin-bottom: 12px;
  font-family: var(--font-ui);
}
.sns-body {
  font-family: var(--font-ui);
  font-size: 13px;
  color: var(--text-dim);
  line-height: 1.8;
  white-space: pre-line;
}
.sns-stats {
  font-family: var(--font-ui);
  font-size: 11px;
  color: var(--section-color);
  margin-top: 12px;
  letter-spacing: 0.1em;
}

/* sns comments */
.page-sns-comments {
  background: var(--sns-bg);
  border: 1px solid var(--sns-border);
  border-radius: 8px;
  overflow: hidden;
  margin: 8px 0;
}
.sns-comment {
  padding: 14px 20px;
  border-bottom: 1px solid var(--sns-border);
}
.sns-comment:last-child { border-bottom: none; }
.sns-comment-header {
  display: flex;
  align-items: baseline;
  gap: 10px;
  margin-bottom: 6px;
}
.sns-comment-author {
  font-family: var(--font-ui);
  font-size: 12px;
  font-weight: 600;
  color: #8899cc;
}
.sns-comment-time {
  font-family: var(--font-ui);
  font-size: 11px;
  color: var(--section-color);
}
.sns-comment-text {
  font-family: var(--font-ui);
  font-size: 13px;
  color: var(--text-dim);
  line-height: 1.75;
  white-space: pre-line;
}
.sns-comment-likes {
  font-family: var(--font-ui);
  font-size: 11px;
  color: var(--section-color);
  margin-top: 6px;
}

/* DATA LOST */
.page-data-lost {
  text-align: center;
  padding: 16px 0;
  font-family: var(--font-ui);
  font-size: 13px;
  letter-spacing: 0.6em;
  color: var(--red);
  opacity: 0.7;
}
.page-data-lost::before { content: '— '; }
.page-data-lost::after { content: ' —'; }

/* text with ruby annotation */
.page-text-annot p {
  text-indent: 2em;
}
ruby rt {
  font-family: var(--font-ui);
  font-size: 10px;
  color: var(--accent);
  letter-spacing: 0.05em;
}

/* chapter end */
.page-chapter-end {
  text-align: center;
  padding: 60px 0 30px;
  font-family: var(--font-ui);
  font-size: 12px;
  letter-spacing: 0.5em;
  color: var(--text-dim);
}

/* ── TRANSITIONS ── */
#page-container { opacity: 1; transition: opacity 0.3s ease; }
#page-container.fade-out { opacity: 0; }

/* ── KEYFRAMES ── */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes pulse {
  0%, 100% { opacity: 0.4; }
  50% { opacity: 1; }
}

/* ── MOBILE ── */
@media (max-width: 768px) {
  html, body {
    width: 100vw;
    height: 100svh;
    overflow: hidden;
  }
  #screen-main, #screen-reader, #screen-cg {
    width: 100vw;
    height: 100svh;
  }

  /* main screen: stack vertically */
  #screen-main { display: flex; flex-direction: column; }
  .main-cover-wrap {
    position: relative;
    flex-shrink: 0;
    height: 42vh;
    min-height: 180px;
    overflow: hidden;
  }
  .main-header-img {
    animation: none !important;
    opacity: 1 !important;
    object-position: center center;
  }
  .main-header-hover { display: none; }
  .main-overlay {
    background: linear-gradient(to bottom,
      rgba(8,8,15,0) 50%, rgba(8,8,15,0.85) 100%
    );
  }
  .main-brand { bottom: 10px; left: 14px; font-size: 10px; }
  .main-right {
    position: relative;
    right: auto; top: auto; bottom: auto;
    width: 100%;
    flex: 1;
    padding: 16px 20px;
    gap: 12px;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    justify-content: flex-start;
  }
  .chapter-list {
    grid-template-columns: 1fr;
    gap: 8px;
    animation: none;
    opacity: 1;
  }
  .chapter-item .ch-title { white-space: normal; }
  .main-right-label { animation: none; opacity: 1; }

  /* topbar */
  #topbar { height: 80px; padding: 0 16px; }
  #topbar-left { gap: 2px; }
  #topbar-chapter { font-size: 11px; letter-spacing: 0.1em; }
  #section-indicator { height: 56px; }
  .digit-wrap { font-size: 52px; height: 52px; }
  #topbar-right { gap: 12px; }
  .topbar-btn { font-size: 11px; padding: 4px 8px; }

  /* content + container */
  #content-area { top: 80px; bottom: 52px; }
  #page-container { width: calc(100vw - 40px); padding: 16px 0; }
  #page-container.showing-cg { width: 100vw; }
  .page-cg-inline { margin: 0; }

  /* bottombar */
  #bottombar { height: 52px; gap: 16px; }
  .nav-btn { font-size: 11px; padding: 6px 10px; }
  /* text */
  .page-text p { font-size: 15px; line-height: 1.9; }
  .page-epigraph { margin: 0 20px; }
  .sns-body, .sns-comment-text { font-size: 12px; }
}

/* ── CHAPTER SPLASH (mobile first page) ── */
.page-chapter-splash {
  position: relative;
  width: 100%;
  height: 100%;
  overflow: hidden;
}
.splash-img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: center;
  display: block;
}
.splash-overlay {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  padding: 32px 24px 24px;
  background: linear-gradient(to top, rgba(8,8,15,0.92) 0%, rgba(8,8,15,0.4) 60%, transparent 100%);
}
.splash-num {
  font-family: var(--font-ui);
  font-size: 11px;
  letter-spacing: 0.35em;
  color: rgba(255,255,255,0.5);
  text-transform: uppercase;
}
.splash-title {
  font-size: 18px;
  font-weight: 600;
  color: #fff;
  margin-top: 6px;
  line-height: 1.4;
}

</style>
</head>
<body>

<!-- MAIN SCREEN (title + chapter select) -->
<div id="screen-main">
  <div class="main-cover-wrap">
    <img class="main-header-img" src="chapter0/header.jpg" alt=""
         onerror="this.style.display='none'">
    <img class="main-header-hover" id="main-cover-hover-a" src="" alt="">
    <img class="main-header-hover" id="main-cover-hover-b" src="" alt="">
    <div class="main-overlay"></div>
    <div class="main-brand">fateweibo2025</div>
  </div>
  <div class="main-right">
    <div class="main-right-label">目录 · Contents</div>
    <div class="chapter-list" id="chapter-list"></div>
  </div>
</div>

<!-- READER SCREEN -->
<div id="screen-reader">
  <div id="topbar">
    <div id="topbar-left">
      <span id="topbar-chapter">序章 · 逢坂莫奈将会拥有平静幸福的人生</span>
      <span id="section-indicator"></span>
    </div>
    <div id="topbar-right">
      <div class="topbar-btn" id="btn-home">目录</div>
      <div class="topbar-btn" id="btn-auto">Auto</div>
    </div>
  </div>

  <div id="content-area">
    <div id="page-container"></div>
  </div>

  <div id="bottombar">
    <div class="nav-btn" id="btn-prev">上一页</div>
    <div id="page-counter">1 / 1</div>
    <div id="page-jump-wrap">
      <input id="page-jump-input" type="text" maxlength="4" placeholder="页码">
      <span id="page-jump-hint">↵ 跳转</span>
    </div>
    <div class="nav-btn" id="btn-next">下一页</div>
  </div>
</div>

<!-- CG SCREEN -->
<div id="screen-cg">
  <img id="cg-img" src="" alt="">
</div>


<script>
const CHAPTER0 = {
  "id": "chapter0",
  "title": "序章",
  "subtitle": "逢坂莫奈将会拥有平静幸福的人生",
  "pages": [
    {
      "type": "chapter_open"
    },
    {
      "type": "section",
      "number": "00"
    },
    {
      "type": "epigraph",
      "lines": [
        "逢坂莫奈■■■■■■■。",
        "逢坂莫奈是个普通人。",
        "逢坂莫奈将会拥有平静幸福的人生。"
      ]
    },
    {
      "type": "text",

<script>
// ── STATE ──
let currentPage = 0;
let autoPlay = false;
let autoTimer = null;
let cgPending = false;
let autoSpeedIdx = 0;
const AUTO_SPEEDS = [4000, 2000];
const AUTO_LABELS = ['Auto 1×', 'Auto 2×'];

let pages = [];
let total = 0;

// ── ELEMENTS ──
const screenMain = document.getElementById('screen-main');
const screenReader = document.getElementById('screen-reader');
const screenCg = document.getElementById('screen-cg');
const pageContainer = document.getElementById('page-container');
const pageCounter = document.getElementById('page-counter');
const btnPrev = document.getElementById('btn-prev');
const btnNext = document.getElementById('btn-next');
const btnAuto = document.getElementById('btn-auto');
const btnHome = document.getElementById('btn-home');
const cgImg = document.getElementById('cg-img');

// ── RENDER ──
function renderPage(page) {
  const t = page.type;

  if (t === 'chapter_open') {
    return `<div style="height:60px"></div>`;
  }

  if (t === 'chapter_end') {
    return `<div class="page-chapter-end">${page.text}</div>`;
  }

  if (t === 'section') {
    return ''; // section pages are filtered out; number shown in topbar
  }

  if (t === 'epigraph') {
    return `<div class="page-epigraph">${page.lines.map(l => `<p>${l}</p>`).join('')}</div>`;
  }

  if (t === 'text') {
    const cls = page.memory ? 'page-text memory' : 'page-text';
    const ps = page.paragraphs.map(p => {
      const noIndent = p.startsWith('「') || p.startsWith('……') || p === '……' || p === '停下。' || p === '下滑。';
      return `<p${noIndent ? ' class="no-indent"' : ''}>${p}</p>`;
    }).join('');
    return `<div class="${cls}">${ps}</div>`;
  }

  if (t === 'text_with_annotation') {
    let html = page.text;
    for (const ann of page.annotations) {
      html = html.replace(ann.word, `<ruby>${ann.word}<rt>${ann.ruby}</rt></ruby>`);
    }
    const noIndent = page.text.startsWith('「');
    return `<div class="page-text page-text-annot"><p${noIndent ? ' class="no-indent"' : ''}>${html}</p></div>`;
  }

  if (t === 'sns_post') {
    return `<div class="page-sns-post">
      <div class="sns-platform">${page.platform}</div>
      <div class="sns-author">${page.author}</div>
      <div class="sns-title">${page.title}</div>
      <div class="sns-body">${page.body}</div>
    </div>`;
  }

  if (t === 'sns_comments') {
    const items = page.comments.map(c => `
      <div class="sns-comment">
        <div class="sns-comment-header">
          <span class="sns-comment-author">${c.author}</span>
          <span class="sns-comment-time">${c.time}</span>
        </div>
        <div class="sns-comment-text">${c.text}</div>
        <div class="sns-comment-likes">▲ ${c.likes}</div>
      </div>`).join('');
    return `<div class="page-sns-comments">${items}</div>`;
  }

  if (t === 'data_lost') {
    return `<div class="page-data-lost">DATA LOST</div>`;
  }

  if (t === 'cg') {
    return `<div class="page-cg-inline"><img class="cg-inline-img" src="${page.src}" alt=""></div>`;
  }

  if (t === 'chapter_splash') {
    return `<div class="page-chapter-splash">
      <img class="splash-img" src="${page.src}" alt="">
      <div class="splash-overlay">
        <div class="splash-num">${page.num}</div>
        <div class="splash-title">${page.title}</div>
      </div>
    </div>`;
  }

  return '';
}

function showPage(idx, instant) {
  if (instant) {
    doShowPage(idx);
  } else {
    pageContainer.classList.add('fade-out');
    setTimeout(() => {
      pageContainer.classList.remove('fade-out');
      doShowPage(idx);
    }, 280);
  }
}

let currentSection = null;

function updateSectionIndicator(sec) {
  const el = document.getElementById('section-indicator');
  if (!sec) { el.innerHTML = ''; el.dataset.prev = ''; return; }

  const prev = el.dataset.prev || '';
  el.dataset.prev = sec;

  const len = Math.max(prev.length, sec.length);
  const p = prev.padStart(len, ' ');
  const s = sec.padStart(len, ' ');

  el.innerHTML = '';
  for (let i = 0; i < len; i++) {
    const wrap = document.createElement('span');
    wrap.className = 'digit-wrap';

    if (!prev || p[i] === s[i]) {
      const d = document.createElement('span');
      d.className = 'digit-static';
      d.textContent = s[i];
      wrap.appendChild(d);
    } else {
      const dOut = document.createElement('span');
      dOut.className = 'digit-out';
      dOut.textContent = p[i];
      const dIn = document.createElement('span');
      dIn.className = 'digit-in';
      dIn.textContent = s[i];
      wrap.appendChild(dOut);
      wrap.appendChild(dIn);
    }
    el.appendChild(wrap);
  }
}

function doShowPage(idx) {
  currentPage = idx;
  const page = pages[idx];

  pageContainer.classList.toggle('showing-cg', page.type === 'cg' || page.type === 'chapter_splash');
  pageContainer.innerHTML = renderPage(page);
  pageContainer.scrollTop = 0;

  if (page._section !== currentSection) {
    currentSection = page._section;
    updateSectionIndicator(currentSection);
  }

  pageCounter.textContent = `${idx + 1} / ${total}`;
  btnPrev.classList.toggle('disabled', idx === 0);
  btnNext.classList.toggle('disabled', idx === total - 1);

  if (autoPlay && idx < total - 1) {
    scheduleAuto();
  }
}

function showCG(src, returnIdx) {
  cgImg.src = src;
  screenCg.style.display = 'flex';
  screenCg.style.opacity = '0';
  requestAnimationFrame(() => {
    screenCg.style.transition = 'opacity 0.6s ease';
    screenCg.style.opacity = '1';
  });
  cgPending = returnIdx + 1;
}

function hideCG() {
  screenCg.style.transition = 'opacity 0.4s ease';
  screenCg.style.opacity = '0';
  setTimeout(() => {
    screenCg.style.display = 'none';
    if (cgPending !== false) {
      doShowPage(cgPending);
      cgPending = false;
    }
  }, 400);
}

function goNext() {
  if (currentPage < total - 1) showPage(currentPage + 1, false);
}
function goPrev() {
  if (currentPage > 0) showPage(currentPage - 1, false);
}

function scheduleAuto() {
  clearTimeout(autoTimer);
  autoTimer = setTimeout(goNext, AUTO_SPEEDS[autoSpeedIdx]);
}

function toggleAuto() {
  autoSpeedIdx = (autoSpeedIdx + 1) % (AUTO_SPEEDS.length + 1);
  autoPlay = autoSpeedIdx < AUTO_SPEEDS.length;
  btnAuto.textContent = autoPlay ? AUTO_LABELS[autoSpeedIdx] : 'Auto';
  btnAuto.classList.toggle('active', autoPlay);
  if (autoPlay) {
    scheduleAuto();
  } else {
    clearTimeout(autoTimer);
  }
}

  { id: 'chapter5', num: 'Chapter 5', title: '前行吧，或许希望就在前方',                locked: true, coverImg: '第5章.jpg' },
  { id: 'chapter6', num: 'Chapter 6', title: 'Unforgettable, That\'s What You Are',   locked: true, coverImg: '第6章.jpg' },
  { id: 'chapter7', num: 'Chapter 7', title: '所谓人者，皆如微尘',                     locked: true, coverImg: '第7章.jpg' },
  { id: 'chapter8', num: 'Chapter 8', title: '所谓人者，皆为星辰',                     locked: true, coverImg: '第8章.jpg' },
];

const chapterList = document.getElementById('chapter-list');
const hoverA = document.getElementById('main-cover-hover-a');
const hoverB = document.getElementById('main-cover-hover-b');
let activeHover = null; // 'a' | 'b' | null

// Preload all cover images
CHAPTERS.forEach(ch => {
  if (ch.coverImg) { const img = new Image(); img.src = ch.coverImg; }
});

function showCover(src, pos) {
  const p = pos || 'center center';
  if (!src) {
    hoverA.style.opacity = '0';
    hoverB.style.opacity = '0';
    activeHover = null;
    return;
  }
  const next = activeHover === 'a' ? 'b' : 'a';
  const nextEl = next === 'a' ? hoverA : hoverB;
  const prevEl = next === 'a' ? hoverB : hoverA;
  nextEl.src = src;
  nextEl.style.objectPosition = p;
  nextEl.style.opacity = '1';
  prevEl.style.opacity = '0';
  activeHover = next;
}

CHAPTERS.forEach((ch) => {
  const el = document.createElement('div');
  el.className = 'chapter-item' + (ch.locked ? ' locked' : '');
  el.innerHTML = `<div class="ch-num">${ch.num}</div><div class="ch-title">${ch.title}</div>`;
  if (!ch.locked) {
    el.addEventListener('click', () => startChapter(ch));
  }
  if (ch.coverImg && window.innerWidth > 768) {
    el.addEventListener('mouseenter', () => showCover(ch.coverImg, ch.coverPos));
  }
  chapterList.appendChild(el);
});

chapterList.addEventListener('mouseleave', () => showCover(null));

function startChapter(ch) {
  pages.length = 0;
  currentSection = null;
  let sec = null;
  if (window.innerWidth <= 768 && ch.coverImg) {
    pages.push({ type: 'chapter_splash', src: ch.coverImg, num: ch.num, title: ch.title, _section: null });
  }
  for (const p of ch.data.pages) {
    if (p.type === 'chapter_open') continue;
    if (p.type === 'section') { sec = p.number; continue; }
    pages.push(Object.assign({}, p, { _section: sec }));
  }
  total = pages.length;

  screenMain.style.transition = 'opacity 0.5s ease';
  screenMain.style.opacity = '0';
  setTimeout(() => {
    screenMain.style.display = 'none';
    screenReader.style.display = 'flex';
    document.getElementById('topbar-chapter').textContent = ch.num + ' · ' + ch.title;
    showPage(0, true);
  }, 500);
}

// ── EVENTS ──
screenCg.addEventListener('click', hideCG);

document.addEventListener('click', (e) => {
  if (screenMain.style.display !== 'none') return;
  if (screenCg.style.display === 'flex') return;
  if (e.target.closest('#topbar') || e.target.closest('#bottombar')) return;
  if (autoPlay) return;
  goNext();
});

document.addEventListener('keydown', (e) => {
  if (e.code === 'Space' || e.code === 'ArrowRight') {
    if (screenCg.style.display === 'flex') { hideCG(); return; }
    if (!autoPlay) goNext();
  }
  if (e.code === 'ArrowLeft') {
    if (!autoPlay) goPrev();
  }
  if (e.code === 'Escape') {
    if (autoPlay) toggleAuto();
  }
});

const pageJumpWrap = document.getElementById('page-jump-wrap');
const pageJumpInput = document.getElementById('page-jump-input');

pageCounter.addEventListener('click', (e) => {
  e.stopPropagation();
  pageCounter.style.display = 'none';
  pageJumpWrap.style.display = 'flex';
  pageJumpInput.value = '';
  pageJumpInput.focus();
});

function closeJump() {
  pageJumpWrap.style.display = 'none';
  pageCounter.style.display = '';
}

pageJumpInput.addEventListener('keydown', (e) => {
  e.stopPropagation();
  if (e.key === 'Enter') {
    const n = parseInt(pageJumpInput.value, 10);
    if (!isNaN(n) && n >= 1 && n <= total) showPage(n - 1, false);
    closeJump();
  } else if (e.key === 'Escape') {
    closeJump();
  }
});

pageJumpInput.addEventListener('blur', () => closeJump());

btnPrev.addEventListener('click', (e) => { e.stopPropagation(); goPrev(); });
btnNext.addEventListener('click', (e) => { e.stopPropagation(); goNext(); });
btnAuto.addEventListener('click', (e) => { e.stopPropagation(); toggleAuto(); });
btnHome.addEventListener('click', (e) => {
  e.stopPropagation();
  clearTimeout(autoTimer);
  autoPlay = false; autoSpeedIdx = 0;
  btnAuto.textContent = 'Auto'; btnAuto.classList.remove('active');
  screenReader.style.display = 'none';
  screenMain.style.display = '';
  screenMain.style.opacity = '1';
  screenMain.style.transition = '';
});

// ── FIT TO WINDOW (desktop only) ──
(function () {
  function fit() {
    if (window.innerWidth <= 768) {
      document.body.style.zoom = '';
      return;
    }
    const s = Math.min(window.innerWidth / 1920, window.innerHeight / 960);
    document.body.style.zoom = s;
  }
  fit();
  window.addEventListener('resize', fit);
})();
</script>
